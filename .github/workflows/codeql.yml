name: "CodeQL Security Scan"

on:
  pull_request:
    types:
      - opened
      - synchronize
  schedule:
    - cron: '41 23 * * 2'
  workflow_dispatch:

# Cancels any in progress workflows associated with this PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: [self-hosted, gcc-12.3.0-openmpi-4.1.6]

    permissions:
      # required for all workflows
      security-events: write
      # only required for workflows in private repositories
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
        - language: c-cpp
          build-mode: manual
    defaults:
      run:
        shell: bash -l {0}

    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: Initialize CodeQL
      uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
      env:
        NODE_USE_SYSTEM_CA: 1
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        config: |
          query-filters:
          - exclude:
             tags: cpp/integer-multiplication-cast-to-long

    - name: Print environment
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: |
        env

    - name: Module list
      run: |
        module list
        printenv PATH

    - if: matrix.build-mode == 'manual'
      name: Get dependencies
      working-directory: ./packages/framework
      run: |
          ./get_dependencies.sh

    - if: matrix.build-mode == 'manual'
      name: Generate CMake fragments
      run: |
          git fetch origin ${GITHUB_BASE_REF:-${GITHUB_REF}}

          mkdir -p trilinos_build && cd trilinos_build

          source ${GITHUB_WORKSPACE}/packages/framework/GenConfig/gen-config.sh --force --cmake-fragment genconfig_fragment.cmake rhel8_gcc-openmpi_debug_shared_no-kokkos-arch_no-asan_complex_no-fpic_mpi_no-pt_no-rdc_no-uvm_deprecated-on_no-package-enables
          ${GITHUB_WORKSPACE}/commonTools/framework/get-changed-trilinos-packages.sh origin/${GITHUB_BASE_REF:-${GITHUB_REF}} HEAD package_enables.cmake package_subprojects.cmake

    - if: matrix.build-mode == 'manual'
      name: Configure and build Trilinos
      working-directory: ./trilinos_build
      run: |
          cmake -C genconfig_fragment.cmake -C package_enables.cmake \
            -DTrilinos_ENABLE_ALL_FORWARD_DEP_PACKAGES=OFF \
            -DTrilinos_ENABLE_ALL_OPTIONAL_PACKAGES=OFF \
            -DTrilinos_ENABLE_SECONDARY_TESTED_CODE=OFF \
            ..

          ninja -j 16

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v3.29.5
      with:
        category: "/language:${{matrix.language}}"
