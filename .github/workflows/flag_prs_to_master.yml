name: Flag PRs to master by adding the AT WIP keyword 
# Unless you are the autotester, of course

on:
  pull_request:
    types: [opened]
    branches: [master]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read
  pull-requests: write
  
jobs:
  comment:
    runs-on: ubuntu-latest

    steps:
    - name: Add comment
      uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3.11.0.8.3.11.0
      if: "!contains(github.event.sender.login,'snapshot-app[bot]')"
      with:
         message: |
            You seem to have created a PR on master.  This is not allowed behavior, so we've blocked your PR.  Please switch your PR to target the develop branch and remove the AT: WIP label.
      
